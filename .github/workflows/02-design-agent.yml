name: 02 Design Agent

on:
  issues:
    types: [labeled]

jobs:
  design:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'needs-design'
    permissions:
      issues: write
    steps:
      - name: Post design guide comment
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;

            const prompt = [
              'You are a UX/UI design assistant. Based on this feature issue, provide a detailed design guide.',
              '',
              'Issue Title: ' + issue.title,
              'Issue Body: ' + (issue.body || '(no description)'),
              '',
              'Please provide:',
              '1. UI Components needed',
              '2. User Flow (text-based diagram)',
              '3. Design Principles to follow',
              '4. Accessibility considerations',
              '5. Responsive design notes',
            ].join('\n');

            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-goog-api-key': process.env.GEMINI_API_KEY
              },
              body: JSON.stringify({
                contents: [{ role: 'user', parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 1024 }
              })
            });

            if (!response.ok) {
              throw new Error('Gemini API error: ' + response.status + ' ' + (await response.text()));
            }

            const data = await response.json();
            const guide = data.candidates[0].content.parts[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '## Design Agent Guide\n\n' + guide
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['design-done', 'ready-for-dev']
            });
