name: 02 Design Agent

on:
  issues:
    types: [labeled]

jobs:
  design:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'needs-design'
    permissions:
      issues: write
    steps:
      - name: Post design guide comment
        uses: actions/github-script@v7
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          github-token: ${{ secrets.WORKFLOW_TOKEN }}
          script: |
            const issue = context.payload.issue;

            const prompt = [
              'You are a UX/UI design assistant. Based on this feature issue, provide a detailed design guide.',
              '',
              'Issue Title: ' + issue.title,
              'Issue Body: ' + (issue.body || '(no description)'),
              '',
              'Please provide:',
              '1. UI Components needed',
              '2. User Flow (text-based diagram)',
              '3. Design Principles to follow',
              '4. Accessibility considerations',
              '5. Responsive design notes',
            ].join('\n');

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.GROQ_API_KEY
              },
              body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 1024
              })
            });

            if (!response.ok) {
              throw new Error('Groq API error: ' + response.status + ' ' + (await response.text()));
            }

            const data = await response.json();
            const guide = data.choices[0].message.content;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '## Design Agent Guide\n\n' + guide
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['design-done', 'ready-for-dev']
            });
