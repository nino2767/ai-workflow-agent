name: 04 QA Agent

on:
  pull_request:
    types: [opened]

jobs:
  qa-checklist:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git diff
        id: diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > diff.txt
          {
            echo "diff_content<<EOF"
            head -c 10000 diff.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post QA checklist comment
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIFF_CONTENT: ${{ steps.diff.outputs.diff_content }}
        with:
          script: |
            const diff = process.env.DIFF_CONTENT;
            const pr = context.payload.pull_request;

            const prompt = [
              'You are a QA engineer. Based on this pull request, generate a comprehensive QA checklist.',
              '',
              'PR Title: ' + pr.title,
              'PR Description: ' + (pr.body || '(no description)'),
              '',
              'Diff:',
              '```diff',
              diff,
              '```',
              '',
              'Generate a QA checklist using GitHub checkbox format (- [ ] item) covering:',
              '1. Functional testing scenarios',
              '2. Edge cases to test',
              '3. Regression test areas',
              '4. UI/UX validation points (if applicable)',
              '5. Performance considerations',
              '6. Security testing points (if applicable)',
            ].join('\n');

            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-goog-api-key': process.env.GEMINI_API_KEY
              },
              body: JSON.stringify({
                contents: [{ role: 'user', parts: [{ text: prompt }] }],
                generationConfig: { maxOutputTokens: 2048 }
              })
            });

            if (!response.ok) {
              throw new Error('Gemini API error: ' + response.status + ' ' + (await response.text()));
            }

            const data = await response.json();
            const checklist = data.candidates[0].content.parts[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: '## QA Agent Checklist\n\n' + checklist
            });
