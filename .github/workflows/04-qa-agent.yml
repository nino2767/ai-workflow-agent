name: 04 QA Agent

on:
  pull_request:
    types: [opened]

jobs:
  qa-checklist:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          echo "diff_content<<EOF" >> $GITHUB_OUTPUT
          head -c 10000 diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post QA checklist comment
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIFF_CONTENT: ${{ steps.diff.outputs.diff_content }}
        with:
          script: |
            const diff = process.env.DIFF_CONTENT;
            const pr = context.payload.pull_request;

            const prompt = `You are a QA engineer. Based on this pull request, generate a comprehensive QA checklist.

PR Title: ${pr.title}
PR Description: ${pr.body || '(no description)'}

Diff:
\`\`\`diff
${diff}
\`\`\`

Generate a QA checklist using GitHub checkbox format (- [ ] item) covering:
1. Functional testing scenarios
2. Edge cases to test
3. Regression test areas
4. UI/UX validation points (if applicable)
5. Performance considerations
6. Security testing points (if applicable)`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-opus-4-5',
                max_tokens: 2048,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              throw new Error(`Anthropic API error: ${response.status} ${await response.text()}`);
            }

            const data = await response.json();
            const checklist = data.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## QA Agent Checklist\n\n${checklist}`
            });
