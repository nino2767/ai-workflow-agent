name: 03 Dev Agent

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git diff
        id: diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > diff.txt
          {
            echo "diff_content<<EOF"
            head -c 12000 diff.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post code review comment
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIFF_CONTENT: ${{ steps.diff.outputs.diff_content }}
        with:
          script: |
            const diff = process.env.DIFF_CONTENT;
            const pr = context.payload.pull_request;

            const prompt = [
              'You are a senior software engineer conducting a code review. Review the following pull request diff and provide constructive, actionable feedback.',
              '',
              'PR Title: ' + pr.title,
              'PR Description: ' + (pr.body || '(no description)'),
              '',
              'Diff:',
              '```diff',
              diff,
              '```',
              '',
              'Please provide:',
              '1. Summary of changes',
              '2. Code quality issues (if any)',
              '3. Potential bugs or edge cases',
              '4. Security concerns (if any)',
              '5. Suggestions for improvement',
              '6. Overall assessment (Approve / Request Changes / Comment)',
            ].join('\n');

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.GEMINI_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-opus-4-5',
                max_tokens: 2048,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              throw new Error('Anthropic API error: ' + response.status + ' ' + (await response.text()));
            }

            const data = await response.json();
            const review = data.content[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: '## Dev Agent Code Review\n\n' + review
            });
